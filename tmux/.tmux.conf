# ============================================================================
# Terminal & Display Settings
# ============================================================================

# Use the modern tmux-256color terminfo for best compatibility and features
set -g default-terminal "tmux-256color"

# Enable truecolor (24-bit RGB) for all terminals that advertise *-256color
set -ag terminal-overrides ",*-256color:RGB"

# Enable undercurl support (useful for editors like Neovim)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# Enable colored underscore support (requires tmux 3+)
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Enable extended key support (for more key combinations, e.g. Ctrl-Shift-Arrow)
set -g extended-keys on

# Ensure extended keys are recognized in xterm-compatible terminals
set -as terminal-features 'xterm*:extkeys'

# ============================================================================
# Prefix Key Configuration
# ============================================================================

# Unbind the default prefix (C-b) and set to C-Space for convenience
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ============================================================================
# Window & Pane Management
# ============================================================================

# Pane splitting
unbind %
bind H split-window -h

unbind '"'
bind V split-window -v

# Window swapping
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Config reload
unbind r
bind r source-file ~/.tmux.conf

# Pane navigation (vim style)
bind-key h select-pane -L
bind-key l select-pane -R
bind-key j select-pane -D
bind-key k select-pane -U

# Remap kill-window to Prefix + w
unbind w
bind w kill-window

# Remap new window (tab) to Prefix + t
unbind t
bind t new-window

# Pane resizing
bind-key -r -T prefix       Up              resize-pane -U 5
bind-key -r -T prefix       Down            resize-pane -D 5
bind-key -r -T prefix       Left            resize-pane -L 5
bind-key -r -T prefix       Right           resize-pane -R 5

# ============================================================================
# Mouse & Copy Mode
# ============================================================================

set -g mouse on

set-window-option -g mode-keys vi
bind Enter copy-mode \; send-keys -X start-of-line # start copy mode at the beginning of the line
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle # toggle rectangle selection with "r"
bind-key -T copy-mode-vi C-d send-keys -X halfpage-down \; send-keys -X middle-line
bind-key -T copy-mode-vi C-u send-keys -X halfpage-up \; send-keys -X middle-line

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse


# ============================================================================
# Session Management & Project Shortcuts
# ============================================================================

# General session switcher
bind-key -r n display-popup -E "~/.local/scripts/tmux-sessionizer"

# Session navigation
bind-key l switch-client -n
bind-key h switch-client -p

# Fuzzy session picker (overrides default choose-tree)
bind-key f display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse --header='Switch Session' --preview='tmux capture-pane -ep -t {}' | xargs tmux switch-client -t"

# Work projects
bind-key D run-shell "~/.local/scripts/tmux-sessionizer ~/git/ren-design-system"
bind-key N run-shell "~/.local/scripts/tmux-sessionizer ~/git/netlin4/weblin/"
bind-key R run-shell "~/.local/scripts/tmux-sessionizer ~/git/ren.no"
bind-key S run-shell "~/.local/scripts/tmux-sessionizer ~/git/search/"
bind-key P run-shell "~/.local/scripts/tmux-sessionizer ~/git/developer-portal/"
bind-key G run-shell "~/.local/scripts/tmux-sessionizer ~/git/prototype-groft-kabelkretser/"

# Dotfiles
bind-key \' run-shell "~/.local/scripts/tmux-sessionizer ~/dotfiles"

# ============================================================================
# General Settings & Behavior
# ============================================================================

set -sg escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g set-clipboard on
set -g set-titles on
set-option -g set-titles-string "#S (#W)"
set -g history-limit 5000
set -g monitor-activity on
set -g visual-activity off
set -g status-interval 10
set -g focus-events on
set -g repeat-time 1000
set -g aggressive-resize on
set-option -g status-position top

# Environment passthrough (from your config)
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM


# ============================================================================
# Plugin Configuration
# ============================================================================

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# Statusline
set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style "rounded"
set -g status-right-length 100
set -g status-left-length 100

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

# Center the window list (tabs)
set -g status-justify centre

# Use rounded corners for the session box (requires Powerline font)
set -g status-left '#[fg=#{@thm_fg},bg=#{@thm_mantle}] #S '


# Show window name or application in tabs
set-window-option -g window-status-format " #I:#W "
set-window-option -g window-status-current-format " #[bold]#I:#W#[default] "

set -g @plugin 'catppuccin/tmux'

set -g status-right "#{E:@catppuccin_status_application}"

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'lazygit opencode claude'


if-shell '[ -d ~/.tmux/plugins/tpm ]' "run '~/.tmux/plugins/tpm/tpm'"
